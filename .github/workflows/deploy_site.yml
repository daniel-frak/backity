name: Deploy website

on:
  push:
    branches: [ main ]
    paths:
      - 'website/**'
      - 'docs/**'
      - 'branding/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    # Minimal permissions required for building and uploading Pages artifact
    permissions:
      contents: read # required by actions/checkout
      pages: write # required by actions/configure-pages

    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install, build, and upload your site
        # https://github.com/withastro/action
        uses: withastro/action@e84f40bd8d2caa9e768ec82ad30dd81f0b280853 # v6
        with:
          path: ./website

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write # required to deploy to GitHub Pages
      id-token: write # required for OIDC authentication
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
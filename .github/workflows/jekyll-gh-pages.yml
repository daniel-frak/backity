# Custom workflow originally necessitated by a desire to reduce duplication of assets across the repository

name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows us to run this workflow manually from the Actions tab
  workflow_dispatch:

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest

    # Minimal permissions required for building and uploading Pages artifact
    permissions:
      contents: read # required by actions/checkout
      pages: write # required by actions/configure-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy favicon
        run: |
          mkdir -p docs/assets
          cp branding/favicon.svg docs/assets/docs_favicon.svg

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    permissions:
      pages: write # required to deploy to GitHub Pages
      id-token: write # required for OIDC authentication

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4